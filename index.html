<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:2rem 1rem;}
.sys-tag{font-size:10px;font-weight:500;letter-spacing:0.14em;color:#7F77DD;border:1px solid rgba(83,74,183,0.4);border-radius:4px;padding:3px 12px;display:inline-block;margin-bottom:10px;}
.main-title{font-size:22px;font-weight:500;color:#fff;margin-bottom:4px;text-align:center;}
.main-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:1.5rem;text-align:center;}
.machine-body{width:300px;background:#1a1035;border-radius:24px 24px 16px 16px;border:2px solid #3a2a6a;position:relative;padding-bottom:20px;margin-bottom:1.5rem;}
.machine-header{background:#251848;border-radius:22px 22px 0 0;padding:14px 20px 10px;text-align:center;border-bottom:2px solid #3a2a6a;}
.machine-header-title{font-size:11px;font-weight:500;color:#7F77DD;letter-spacing:0.16em;}
.machine-lights{display:flex;justify-content:center;gap:8px;margin-top:8px;}
.light{width:8px;height:8px;border-radius:50%;animation:blink 1.2s ease-in-out infinite;}
.light:nth-child(2){animation-delay:0.4s;}
.light:nth-child(3){animation-delay:0.8s;}
.light:nth-child(4){animation-delay:1.2s;}
@keyframes blink{0%,100%{opacity:0.3;}50%{opacity:1;}}
.globe-area{margin:16px auto;width:200px;height:200px;position:relative;}
.globe-outer{width:200px;height:200px;border-radius:50%;background:#0d0820;border:3px solid #3a2a6a;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.globe-shine{position:absolute;top:12px;left:20px;width:50px;height:30px;background:rgba(255,255,255,0.06);border-radius:50%;transform:rotate(-30deg);}
.globe-ring{position:absolute;inset:-8px;border-radius:50%;border:6px solid transparent;border-top-color:#534AB7;border-bottom-color:#534AB7;opacity:0.4;}
.globe-ring2{position:absolute;inset:-16px;border-radius:50%;border:4px solid transparent;border-left-color:#7F77DD;border-right-color:#7F77DD;opacity:0.25;}
.capsule-display{width:140px;height:140px;border-radius:50%;background:#13101e;border:2px solid #2a2050;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;}
.capsule-shape{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;}
.capsule-top{position:absolute;top:0;left:0;right:0;height:50%;border-radius:50px 50px 0 0;opacity:0.9;}
.capsule-bot{position:absolute;bottom:0;left:0;right:0;height:50%;border-radius:0 0 50px 50px;opacity:0.7;}
.capsule-line{position:absolute;top:50%;left:8px;right:8px;height:2px;background:rgba(255,255,255,0.15);transform:translateY(-50%);}
.capsule-shine{position:absolute;top:12px;left:18px;width:20px;height:12px;background:rgba(255,255,255,0.2);border-radius:50%;transform:rotate(-20deg);}
.capsule-text{position:relative;z-index:1;font-size:10px;font-weight:500;text-align:center;line-height:1.35;padding:0 10px;color:#fff;}
.capsule-shape.spinning{animation:wobble 0.12s linear infinite;}
@keyframes wobble{0%{transform:scale(1) rotate(0deg);}50%{transform:scale(1.08) rotate(180deg);}100%{transform:scale(1) rotate(360deg);}}
.slot-tube{width:60px;height:24px;background:#0d0820;border:2px solid #3a2a6a;border-radius:12px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;}
.slot-hole{width:16px;height:16px;border-radius:50%;background:#050510;border:2px solid #2a2050;}
.coin-slot{width:80px;height:20px;background:#0d0820;border:2px solid #3a2a6a;border-radius:10px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;}
.coin-slit{width:40px;height:4px;background:#050510;border-radius:2px;}
.deco-row{display:flex;justify-content:space-between;padding:0 20px;margin-bottom:10px;}
.lever-area{display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:6px;}
.lever-base{width:28px;height:28px;border-radius:50%;background:#251848;border:2px solid #534AB7;}
.lever-stick{width:10px;height:52px;background:#3a2a6a;border-radius:5px;transition:transform 0.2s;transform-origin:bottom center;}
.lever-stick.pulled{transform:rotate(30deg);}
.lever-btn{background:#534AB7;color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:500;padding:13px 40px;cursor:pointer;letter-spacing:0.08em;transition:background 0.2s,transform 0.1s;font-family:inherit;}
.lever-btn:hover{background:#7F77DD;transform:scale(1.04);}
.lever-btn:active{transform:scale(0.97);}
.lever-btn:disabled{background:#2a2a4a;color:#5F5E5A;cursor:not-allowed;transform:none;}
.cnt-row{text-align:center;font-size:10px;color:#5F5E5A;margin-top:6px;}
.result-area{width:100%;max-width:520px;display:none;}
.result-area.show{display:block;}
.result-card{background:#13131f;border:1px solid #2a2a4a;border-radius:12px;padding:1.25rem;margin-bottom:10px;}
.rc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.rc-badge{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rc-name{font-size:16px;font-weight:500;color:#fff;margin-bottom:3px;}
.rc-val{font-size:11px;letter-spacing:0.06em;}
.pbox{background:#0d0d1a;border:1px solid #2a2a4a;border-radius:8px;padding:12px 14px;margin-bottom:10px;}
.pbox-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.plabel{font-size:10px;color:#534AB7;letter-spacing:0.1em;font-weight:500;}
.copy-btn{background:rgba(83,74,183,0.2);border:1px solid rgba(83,74,183,0.4);border-radius:4px;padding:3px 10px;color:#7F77DD;font-size:10px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.2s;white-space:nowrap;}
.copy-btn:hover{background:rgba(83,74,183,0.35);}
.copy-btn.copied{background:rgba(29,158,117,0.2);border-color:rgba(29,158,117,0.4);color:#1D9E75;}
.ptext{font-size:12px;color:rgba(255,255,255,0.75);line-height:1.7;}
.ai-label{font-size:11px;color:#5F5E5A;margin-bottom:8px;letter-spacing:0.05em;}
.ai-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.ai-btn{border:1px solid #2a2a4a;border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;text-decoration:none;display:block;background:#0d0d1a;}
.ai-btn:hover{border-color:#534AB7;background:#1a1535;}
.ai-name{font-size:12px;font-weight:500;margin-bottom:2px;}
.ai-sub{font-size:10px;color:#5F5E5A;}
.submit-btn{width:100%;background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.2s;margin-bottom:8px;text-decoration:none;display:block;text-align:center;}
.submit-btn:hover{background:#0F6E56;}
.again-btn{width:100%;background:rgba(83,74,183,0.12);border:1px solid rgba(83,74,183,0.3);border-radius:8px;padding:11px;color:#7F77DD;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.again-btn:hover{background:rgba(83,74,183,0.22);}
</style>
</head>

  {name:"담대한 목적을 향한 도전",short:"담대한 도전",colorA:"#534AB7",colorB:"#3a2a8a",textColor:"#AFA9EC",

var totalCnt=0,spinning=false,currentPrompt="";

function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}

function pull(){
  if(spinning)return;
  spinning=true;
  document.getElementById('lever-btn').disabled=true;
  document.getElementById('result-area').classList.remove('show');
  document.getElementById('lever-stick').classList.add('pulled');
  document.getElementById('lever-stick2').classList.add('pulled');
  var shape=document.getElementById('capsule-shape');
  var capTop=document.getElementById('cap-top');
  var capBot=document.getElementById('cap-bot');
  var capText=document.getElementById('cap-text');
  shape.classList.add('spinning');
  capText.style.fontSize='10px';
  var i=0,frames=22;
  var iv=setInterval(function(){
    var v=values[i%values.length];
    capTop.style.background=v.colorA;
    capBot.style.background=v.colorB;
    capText.style.color=v.textColor;
    capText.textContent=v.short;
    i++;
    if(i>=frames){
      clearInterval(iv);
      shape.classList.remove('spinning');
      document.getElementById('lever-stick').classList.remove('pulled');
      document.getElementById('lever-stick2').classList.remove('pulled');
      var result=values[Math.floor(Math.random()*values.length)];
      showResult(result);
      spinning=false;
      totalCnt++;
      document.getElementById('cnt').textContent=totalCnt;
      document.getElementById('lever-btn').disabled=false;
    }
  },90);
}

function showResult(v){
  var prompt=rnd(v.prompts);
  var preview=rnd(v.previews);
  currentPrompt=prompt;
  document.getElementById('cap-top').style.background=v.colorA;
  document.getElementById('cap-bot').style.background=v.colorB;
  document.getElementById('cap-text').style.color=v.textColor;
  document.getElementById('cap-text').style.fontSize='10px';
  document.getElementById('cap-text').textContent=v.short;
  var badge=document.getElementById('rc-badge');
  badge.style.background=v.colorB;
  badge.style.border='1px solid '+v.colorA;
  badge.style.borderRadius='12px';
  badge.innerHTML='<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" fill="'+v.colorA+'" opacity="0.35"/><circle cx="12" cy="12" r="4" fill="'+v.colorA+'"/></svg>';
  document.getElementById('rc-name').textContent=v.name;
  document.getElementById('rc-val').style.color=v.colorA;
  document.getElementById('rc-val').textContent='핵심가치 테마 획득';
  document.getElementById('prompt-text').textContent=prompt;
  document.getElementById('char-preview').textContent=preview;
  var copyBtn=document.getElementById('copy-btn');
  copyBtn.textContent='복사하기';
  copyBtn.classList.remove('copied');
  document.getElementById('result-area').classList.add('show');
  window.scrollTo(0,document.body.scrollHeight);
}

function copyPrompt(){
  if(!currentPrompt)return;
  var btn=document.getElementById('copy-btn');
  function done(){
    btn.textContent='복사됨!';
    btn.classList.add('copied');
    setTimeout(function(){btn.textContent='복사하기';btn.classList.remove('copied');},2000);
  }
  if(navigator.clipboard){
    navigator.clipboard.writeText(currentPrompt).then(done).catch(function(){fallbackCopy();done();});
  } else {fallbackCopy();done();}
}

function fallbackCopy(){
  var ta=document.createElement('textarea');
  ta.value=currentPrompt;
  ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  document.execCommand('copy');document.body.removeChild(ta);
}

function pullAgain(){
  document.getElementById('result-area').classList.remove('show');
  document.getElementById('cap-top').style.background='#2a1a55';
  document.getElementById('cap-bot').style.background='#1a1035';
  document.getElementById('cap-text').style.color='#534AB7';
  document.getElementById('cap-text').style.fontSize='16px';
  document.getElementById('cap-text').textContent='?';
  window.scrollTo(0,0);
}
